services:
  web:
    container_name: cms_web
    build: .
    working_dir: /app
    restart: unless-stopped
    command: >
      sh -c "
      until pg_isready -h db -p 5432; do sleep 1; done &&
      uvicorn cms_backend.asgi:application --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - media_files:/app/media 
    ports:
      - "8003:8000"
    environment:
      DB_NAME: cms_db
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: cms_db
    image: postgres:15
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: cms_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  static_files:
  media_files:

