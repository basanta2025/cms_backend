services:
  web:
    container_name: cms_web
    build: .
    working_dir: /app
    restart: unless-stopped
    command: >
      sh -c "
      until pg_isready -h db -p 5432; do sleep 1; done &&
      python manage.py migrate &&
      uvicorn cms_backend.asgi:application --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - media_files:/app/media 
    ports:
      - "${WEB_PORT}:8000"
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: cms_db
    image: postgres:15
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${POSTGRES_EXPOSE_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  static_files:
  media_files:

